<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族ダッシュボード - 思い出トーク</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: #FFF8F0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 600px; margin: 0 auto; }
    .card { background: #fff; border-radius: 20px; padding: 32px 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); margin-bottom: 20px; }
    h1 { color: #E8875A; font-size: 22px; margin-bottom: 6px; text-align: center; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 24px; }
    label { display: block; font-size: 15px; font-weight: bold; color: #555; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 16px; font-size: 20px; letter-spacing: 2px; border: 2px solid #E8D5C4; border-radius: 12px; background: #FFFAF7; color: #333; outline: none; text-align: center; }
    input:focus { border-color: #E8875A; }
    button { width: 100%; margin-top: 16px; padding: 16px; background: #E8875A; color: #fff; font-size: 17px; font-weight: bold; border: none; border-radius: 14px; cursor: pointer; }
    button:disabled { background: #ccc; }
    .error { color: #CC4444; font-size: 14px; text-align: center; margin-top: 10px; }
    .hidden { display: none; }
    .status-line { font-size: 14px; color: #888; margin-bottom: 20px; }
    .section-title { font-size: 16px; font-weight: bold; color: #555; margin-bottom: 12px; }
    .diary-item { background: #FFF8F0; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #E8875A; }
    .diary-topic { font-size: 13px; color: #E8875A; font-weight: bold; margin-bottom: 4px; }
    .diary-date { font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .diary-text { font-size: 15px; color: #444; line-height: 1.6; }
    .empty { color: #aaa; font-size: 14px; }
    .paywall-icon { font-size: 48px; margin-bottom: 12px; text-align: center; }
    .paywall-price { font-size: 28px; color: #E8875A; font-weight: bold; margin: 4px 0; text-align: center; }
    .paywall-price-note { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 20px; }
    .worry-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f2ece4; }
    .worry-row:last-child { border-bottom: none; }
    .worry-icon { font-size: 20px; }
    .worry-text { font-size: 15px; color: #555; line-height: 1.6; }
    .compare-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .compare-table th { font-size: 13px; color: #aaa; font-weight: normal; padding: 8px; text-align: center; }
    .compare-table th.plan-paid { color: #E8875A; font-weight: bold; }
    .compare-table td { padding: 12px 8px; font-size: 14px; color: #555; text-align: center; border-top: 1px solid #f2ece4; }
    .compare-table td:first-child { text-align: left; color: #444; }
    .check-yes { color: #6DBF67; font-size: 18px; }
    .check-no { color: #ddd; font-size: 18px; }
    .reassure-box { background: #FFF8F0; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .reassure-item { font-size: 13px; color: #888; line-height: 1.8; }
    .cta-btn { display: block; width: 100%; margin-top: 16px; padding: 18px; background: #E8875A; color: #fff; font-size: 17px; font-weight: bold; border: none; border-radius: 14px; cursor: pointer; text-align: center; text-decoration: none; }

    /* ── ここからダッシュボード本体（購読済み表示） ── */
    .header-card { display: flex; align-items: center; gap: 16px; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; background: #FFF0E0; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .header-name { font-size: 19px; font-weight: bold; color: #333; }
    .header-sub { font-size: 13px; color: #999; margin-top: 2px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .status-dot.online { background: #6DBF67; }
    .status-dot.offline { background: #E0A040; }

    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 4px; }
    .stat-tile { background: #FFF8F0; border-radius: 14px; padding: 14px 8px; text-align: center; }
    .stat-value { font-size: 22px; font-weight: bold; color: #E8875A; }
    .stat-label { font-size: 11px; color: #999; margin-top: 4px; }

    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 90px; margin: 12px 0 6px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
    .bar { width: 100%; max-width: 26px; background: #F5C897; border-radius: 6px 6px 2px 2px; transition: height .3s; }
    .bar.has-entry { background: #E8875A; }
    .bar-day { font-size: 10px; color: #aaa; margin-top: 6px; }

    .med-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 4px; border-bottom: 1px solid #f2ece4; }
    .med-row:last-child { border-bottom: none; }
    .med-slot { font-size: 14px; color: #555; }
    .med-badge { font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 20px; }
    .med-badge.taken { background: #E8F5E9; color: #4C9A4C; }
    .med-badge.missed { background: #FDEDED; color: #C0392B; }
    .med-badge.unknown { background: #F2F2F2; color: #aaa; }
    .adherence-ring-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
    .adherence-num { font-size: 30px; font-weight: bold; color: #E8875A; }
    .adherence-label { font-size: 12px; color: #999; }

    .wellness-box { background: linear-gradient(135deg, #FFF8F0, #FFF0E0); border-radius: 12px; padding: 16px; font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 8px; }
    .wellness-date { font-size: 11px; color: #bbb; margin-bottom: 4px; }
    .mood-row { display: flex; gap: 6px; align-items: flex-end; height: 40px; margin-top: 12px; }
    .mood-dot { flex: 1; border-radius: 6px; background: #F5C897; }
    .mood-dot.good { background: #6DBF67; }
    .mood-dot.bad { background: #E07A5F; }

    .call-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; background: #6DBF67; color: #fff; font-size: 16px; font-weight: bold; border-radius: 14px; text-decoration: none; }

    .mini-trend { display: flex; align-items: flex-end; gap: 6px; height: 50px; margin-top: 10px; }
    .mini-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
    .mini-bar { width: 100%; max-width: 18px; border-radius: 4px 4px 1px 1px; background: #eee; }
    .mini-bar.filled { background: #E8875A; }

    .ack-btn { font-size: 12px; color: #E8875A; background: none; border: 1px solid #E8D5C4; border-radius: 20px; padding: 4px 12px; width: auto; margin-top: 8px; cursor: pointer; }
    .ack-btn.done { color: #6DBF67; border-color: #6DBF67; }
    .ack-btn:disabled { opacity: 0.6; }

    .search-input { font-size: 15px; padding: 10px 14px; letter-spacing: normal; text-align: left; margin-bottom: 12px; }

    .alert-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; color: #888; border-bottom: 1px solid #f2ece4; }
    .alert-row:last-child { border-bottom: none; }
    .alert-icon { font-size: 15px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="benefits-card">
      <h1>👨‍👩‍👧 家族ダッシュボード</h1>
      <p class="subtitle">離れて暮らすご家族の毎日を、<br>スマホひとつで確認できます</p>

      <div class="worry-row">
        <div class="worry-icon">📵</div>
        <div class="worry-text">「電話してもなかなか出ない」「元気にしてるか分からない」…そんな不安はありませんか？</div>
      </div>
      <div class="worry-row">
        <div class="worry-icon">📱</div>
        <div class="worry-text">思い出トークなら、<strong>アプリを開く操作は本人がするだけ</strong>。ご家族は見るだけで大丈夫です。</div>
      </div>

      <table class="compare-table">
        <thead>
          <tr><th></th><th>無料</th><th class="plan-paid">家族プラン<br>月980円</th></tr>
        </thead>
        <tbody>
          <tr><td>ご本人のAI会話・日記作成</td><td><span class="check-yes">✓</span></td><td><span class="check-yes">✓</span></td></tr>
          <tr><td>服薬・水分リマインダー</td><td><span class="check-yes">✓</span></td><td><span class="check-yes">✓</span></td></tr>
          <tr><td>日記をご家族が閲覧</td><td><span class="check-no">－</span></td><td><span class="check-yes">✓</span></td></tr>
          <tr><td>最終利用日時の確認</td><td><span class="check-no">－</span></td><td><span class="check-yes">✓</span></td></tr>
          <tr><td>3日間未利用の自動お知らせ</td><td><span class="check-no">－</span></td><td><span class="check-yes">✓</span></td></tr>
        </tbody>
      </table>

      <p class="paywall-price">月額 980円</p>

      <div class="reassure-box">
        <p class="reassure-item">✓ 合言葉さえあれば、他のご家族も一緒に見られます</p>
      </div>
    </div>

    <div class="card" id="login-card">
      <label for="code">合言葉をお持ちの方はこちら</label>
      <input type="text" id="code" placeholder="例：AB12CD" maxlength="10">
      <button id="login-btn" onclick="login()">見る</button>
      <p class="error hidden" id="error-msg">合言葉が正しくありません</p>
    </div>

    <div class="hidden" id="dashboard-area"></div>
  </div>

  <script>
    // データはanonキーで直接テーブルを読まず、必ずEdge Function経由で取得する。
    // Edge Function側（service role key）が合言葉と購読状態をサーバーサイドで検証するため、
    // anonキーはFunctions呼び出しの認可のみに使い、テーブルへの直接アクセス権は持たせない。
    const FUNCTION_URL = 'https://iyxjyobdpqsyrdbcckis.supabase.co/functions/v1/family-dashboard-data';
    const CHECKOUT_FUNCTION_URL = 'https://iyxjyobdpqsyrdbcckis.supabase.co/functions/v1/create-checkout-session';
    const ANON_KEY = 'sb_publishable_1eBf5hTxX141q9ExRFdImg_Zzuc1NI2';

    async function startCheckout() {
      const btn = document.getElementById('subscribe-btn');
      const errorMsg = document.getElementById('checkout-error-msg');
      errorMsg.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = '準備中...';
      try {
        const res = await fetch(CHECKOUT_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: currentCode }),
        });
        const data = await res.json();
        if (!res.ok || !data.url) throw new Error('checkout_failed');
        location.href = data.url;
      } catch (e) {
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '月額980円で申し込む';
      }
    }

    async function loginWithCode(code) {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.add('hidden');
      if (!code) return;
      currentCode = code;

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = '確認中...';

      try {
        const res = await fetch(`${FUNCTION_URL}?code=${encodeURIComponent(code)}`, {
          headers: { 'Authorization': `Bearer ${ANON_KEY}` },
        });
        if (res.status === 404) {
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = '見る';
          return;
        }
        if (!res.ok) throw new Error('request failed');
        const data = await res.json();
        renderDashboard(data);
      } catch (e) {
        errorMsg.textContent = '通信エラーが発生しました。しばらく後でお試しください。';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '見る';
      }
    }

    function login() {
      const code = document.getElementById('code').value.trim().toUpperCase();
      loginWithCode(code);
    }

    let currentCode = '';
    let currentData = null;

    async function reloadDashboard() {
      const res = await fetch(`${FUNCTION_URL}?code=${encodeURIComponent(currentCode)}`, {
        headers: { 'Authorization': `Bearer ${ANON_KEY}` },
      });
      const data = await res.json();
      renderDashboard(data);
    }

    async function searchDiaries() {
      const q = document.getElementById('diary-search')?.value.trim() || '';
      const res = await fetch(`${FUNCTION_URL}?code=${encodeURIComponent(currentCode)}&q=${encodeURIComponent(q)}`, {
        headers: { 'Authorization': `Bearer ${ANON_KEY}` },
      });
      const data = await res.json();
      currentData = data;
      document.getElementById('diary-list-area').innerHTML = renderDiaryList(data.diaries);
    }

    async function acknowledgeDiary(diaryId, btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = '送信中...';
      try {
        await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: currentCode, action: 'acknowledge_diary', diary_id: diaryId }),
        });
        btnEl.textContent = '👀 確認しました';
        btnEl.classList.add('done');
      } catch {
        btnEl.disabled = false;
        btnEl.textContent = '確認する';
      }
    }

    function renderDiaryList(diaries) {
      if (!diaries || !diaries.length) return '<p class="empty">日記が見つかりません</p>';
      return diaries.map(d => `
        <div class="diary-item">
          <div class="diary-topic">${d.topic || ''}</div>
          <div class="diary-date">${new Date(d.created_at).toLocaleDateString('ja-JP')}</div>
          <div class="diary-text">${d.summary_text}</div>
          <button class="ack-btn ${d.acknowledged ? 'done' : ''}" ${d.acknowledged ? 'disabled' : ''}
            onclick="acknowledgeDiary('${d.id}', this)">${d.acknowledged ? '👀 確認しました' : '確認する'}</button>
        </div>
      `).join('');
    }

    // メール内リンク（?code=XXXXX）から開いた場合は自動ログイン
    (function autoLoginFromUrl() {
      const params = new URLSearchParams(location.search);
      const codeParam = params.get('code');
      if (codeParam) {
        document.getElementById('code').value = codeParam.toUpperCase();
        loginWithCode(codeParam.toUpperCase());
      }
    })();

    function renderDashboard(data) {
      document.getElementById('login-card').classList.add('hidden');
      const area = document.getElementById('dashboard-area');
      area.classList.remove('hidden');

      if (!data.subscribed) {
        // 未購読の場合はbenefits-cardをそのまま残し、確認メッセージと申し込みボタンを追加する
        area.innerHTML = `
          <div class="card">
            <div class="paywall-icon">🔒</div>
            <p class="subtitle" style="margin-bottom:16px;">${data.user_name || 'ご本人'}さんの合言葉を確認しました。<br>閲覧には家族プランへのご登録が必要です。</p>
            <button id="subscribe-btn" onclick="startCheckout()">月額980円で申し込む</button>
            <p class="error hidden" id="checkout-error-msg">通信エラーが発生しました。しばらく後でお試しください。</p>
          </div>
        `;
        return;
      }

      document.getElementById('benefits-card').classList.add('hidden');
      currentData = data;

      const name = data.user_name || 'ご本人';
      const lastSeenDate = data.last_seen_at ? new Date(data.last_seen_at) : null;
      const hoursSince = lastSeenDate ? (Date.now() - lastSeenDate.getTime()) / 3600000 : null;
      const isRecentlyActive = hoursSince !== null && hoursSince < 30;
      const lastSeenText = lastSeenDate ? lastSeenDate.toLocaleString('ja-JP', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '記録なし';

      const weekCount = (data.weeklyActivity || []).reduce((sum, d) => sum + d.count, 0);
      const adherence = data.medicine?.adherenceRate;

      // ── ヘッダー：本人の状態カード＋電話ボタン ──
      const streakBadge = data.streak > 0 ? `<span style="margin-left:8px;color:#E8875A;font-weight:bold;">🔥${data.streak}日連続</span>` : '';
      const callBtnHtml = data.phone
        ? `<a class="call-btn" href="tel:${data.phone}">📞 ${name}さんに電話する</a>`
        : '';
      const headerHtml = `
        <div class="card header-card" style="flex-direction:column; align-items:stretch;">
          <div style="display:flex; align-items:center; gap:16px;">
            <div class="avatar">👤</div>
            <div>
              <div class="header-name">${name}さん${streakBadge}</div>
              <div class="header-sub"><span class="status-dot ${isRecentlyActive ? 'online' : 'offline'}"></span>最終利用：${lastSeenText}</div>
            </div>
          </div>
          ${callBtnHtml}
        </div>
      `;

      // ── サマリー統計 ──
      const waterAdherence = data.water?.adherenceRate;
      const statsHtml = `
        <div class="card">
          <div class="stat-grid">
            <div class="stat-tile">
              <div class="stat-value">${weekCount}</div>
              <div class="stat-label">今週の会話回数</div>
            </div>
            <div class="stat-tile">
              <div class="stat-value">${adherence !== null && adherence !== undefined ? adherence + '%' : '－'}</div>
              <div class="stat-label">服薬達成率（週）</div>
            </div>
            <div class="stat-tile">
              <div class="stat-value">${waterAdherence !== null && waterAdherence !== undefined ? waterAdherence + '%' : '－'}</div>
              <div class="stat-label">水分補給達成率（週）</div>
            </div>
            <div class="stat-tile">
              <div class="stat-value">${(data.diaries || []).length}</div>
              <div class="stat-label">記録された日記</div>
            </div>
          </div>
        </div>
      `;

      // ── 週間の会話推移（簡易棒グラフ） ──
      const maxCount = Math.max(1, ...(data.weeklyActivity || []).map(d => d.count));
      const barsHtml = (data.weeklyActivity || []).map(d => {
        const dayLabel = new Date(d.date + 'T00:00:00').toLocaleDateString('ja-JP', { weekday: 'short' });
        const heightPct = Math.max(6, Math.round((d.count / maxCount) * 100));
        return `
          <div class="bar-col">
            <div class="bar ${d.count > 0 ? 'has-entry' : ''}" style="height:${heightPct}%"></div>
            <div class="bar-day">${dayLabel}</div>
          </div>
        `;
      }).join('');
      const weeklyChartHtml = `
        <div class="card">
          <div class="section-title">📊 今週の会話の様子</div>
          <div class="bar-chart">${barsHtml}</div>
        </div>
      `;

      // ── 服薬状況（本日＋週間トレンド） ──
      const slotLabel = { morning: '朝', noon: '昼', evening: '夜' };
      const todayLogs = data.medicine?.today || [];
      const medRowsHtml = ['morning', 'noon', 'evening'].map(slot => {
        const log = todayLogs.find(l => l.slot === slot);
        const badge = !log
          ? '<span class="med-badge unknown">未確認</span>'
          : log.taken
            ? '<span class="med-badge taken">✓ 服用済み</span>'
            : '<span class="med-badge missed">未服用</span>';
        return `<div class="med-row"><div class="med-slot">${slotLabel[slot]}のお薬</div>${badge}</div>`;
      }).join('');
      const medTrendHtml = renderMiniTrend(data.medicine?.weeklyTrend);
      const medicineHtml = `
        <div class="card">
          <div class="section-title">💊 本日の服薬状況</div>
          ${medRowsHtml}
          <div class="section-title" style="margin-top:16px; font-size:13px;">週間の達成率推移</div>
          ${medTrendHtml}
        </div>
      `;

      // ── 水分補給状況（本日＋週間トレンド） ──
      const waterToday = data.water || {};
      const waterCount = waterToday.todayTakenCount || 0;
      const waterChecks = waterToday.todayCount || 0;
      const waterTrendHtml = renderMiniTrend(data.water?.weeklyTrend);
      const waterHtml = `
        <div class="card">
          <div class="section-title">💧 本日の水分補給</div>
          <div class="med-row">
            <div class="med-slot">声がけ回数：${waterChecks}回</div>
            <span class="med-badge ${waterCount > 0 ? 'taken' : 'unknown'}">${waterCount > 0 ? `✓ ${waterCount}回 補給できています` : '記録なし'}</span>
          </div>
          <div class="section-title" style="margin-top:16px; font-size:13px;">週間の達成率推移</div>
          ${waterTrendHtml}
        </div>
      `;

      // ── 体調チェック履歴（気分推移） ──
      const wellnessList = data.wellnessHistory || [];
      const moodDotsHtml = [...wellnessList].reverse().map(w => {
        const mood = Number(w.mood) || 3;
        const cls = mood >= 4 ? 'good' : mood <= 2 ? 'bad' : '';
        return `<div class="mood-dot ${cls}" style="height:${mood * 20}%" title="${w.checked_date}"></div>`;
      }).join('');
      const wellnessHtml = wellnessList.length
        ? `
          <div class="card">
            <div class="section-title">🩺 最近の体調チェック</div>
            <div class="wellness-date">${wellnessList[0].checked_date}</div>
            <div class="wellness-box">${wellnessList[0].summary || 'コメントなし'}</div>
            <div class="mood-row">${moodDotsHtml}</div>
          </div>
        `
        : '';

      // ── アラート履歴 ──
      const alertLabel = { inactivity: '⚠️ 3日間未利用のお知らせ', weekly_report: '📅 週次レポート送信' };
      const alertLogs = data.alertLogs || [];
      const alertHtml = alertLogs.length
        ? `
          <div class="card">
            <div class="section-title">🔔 お知らせ履歴</div>
            ${alertLogs.map(a => `
              <div class="alert-row">
                <span class="alert-icon">${a.alert_type === 'inactivity' ? '⚠️' : '📅'}</span>
                <span>${alertLabel[a.alert_type] || a.alert_type}</span>
                <span style="margin-left:auto;">${new Date(a.created_at).toLocaleDateString('ja-JP')}</span>
              </div>
            `).join('')}
          </div>
        `
        : '';

      // ── 日記一覧（検索付き） ──
      const diaryListHtml = `
        <div class="card">
          <div class="section-title">📔 日記を探す</div>
          <input class="search-input" id="diary-search" placeholder="キーワードで検索（例：野球）" onkeydown="if(event.key==='Enter') searchDiaries()">
          <button onclick="searchDiaries()" style="margin-bottom:16px;">検索する</button>
          <div id="diary-list-area">${renderDiaryList(data.diaries)}</div>
        </div>
      `;

      area.innerHTML = headerHtml + statsHtml + weeklyChartHtml + medicineHtml + waterHtml + wellnessHtml + alertHtml + diaryListHtml;
    }

    function renderMiniTrend(trend) {
      if (!trend || !trend.length) return '<p class="empty" style="font-size:12px;">データがまだありません</p>';
      return `
        <div class="mini-trend">
          ${trend.map(t => {
            const dayLabel = new Date(t.date + 'T00:00:00').toLocaleDateString('ja-JP', { weekday: 'short' });
            const pct = t.rate === null ? 0 : Math.max(4, t.rate);
            return `
              <div class="mini-bar-col">
                <div class="mini-bar ${t.rate !== null ? 'filled' : ''}" style="height:${pct}%"></div>
                <div class="bar-day">${dayLabel}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }
  </script>
</body>
</html>
