<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント復旧 - 思い出トーク</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: #FFF8F0; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    .card { background: #fff; border-radius: 20px; padding: 32px 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); margin-bottom: 20px; }
    h1 { color: #E8875A; font-size: 20px; margin-bottom: 6px; text-align: center; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 24px; line-height: 1.7; }
    label { display: block; font-size: 15px; font-weight: bold; color: #555; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 16px; font-size: 16px; border: 2px solid #E8D5C4; border-radius: 12px; background: #FFFAF7; color: #333; outline: none; }
    input:focus { border-color: #E8875A; }
    button { width: 100%; margin-top: 16px; padding: 16px; background: #E8875A; color: #fff; font-size: 16px; font-weight: bold; border: none; border-radius: 14px; cursor: pointer; }
    button:disabled { background: #ccc; }
    button.danger { background: #C0392B; }
    .msg { font-size: 14px; text-align: center; margin-top: 12px; line-height: 1.7; }
    .msg.error { color: #CC4444; }
    .msg.success { color: #4C9A4C; }
    .hidden { display: none; }
    .code-box { background: #FFF8F0; border-radius: 12px; padding: 20px; text-align: center; margin-top: 16px; }
    .code-text { font-size: 28px; font-weight: bold; color: #E8875A; letter-spacing: 4px; }
    .hint { font-size: 13px; color: #999; margin-top: 16px; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="request-card">
      <h1>🔑 アカウント復旧</h1>
      <p class="subtitle">アクセスコードを忘れた場合や、端末を紛失した場合、ご登録済みの「ご家族のメールアドレス」宛に復旧リンクをお送りします。</p>
      <label for="email">ご家族のメールアドレス</label>
      <input type="email" id="email" placeholder="family@example.com">
      <button id="request-btn" onclick="requestRecovery()">復旧リンクを送信する</button>
      <p class="msg hidden" id="request-msg"></p>
      <p class="hint">※ 送信可否にかかわらず、常に同じメッセージを表示します（メールアドレスの登録有無を第三者に推測されないための仕様です）。</p>
    </div>

    <div class="card hidden" id="action-card">
      <h1>✅ 本人確認ができました</h1>
      <p class="subtitle" id="welcome-text"></p>
      <button id="reset-code-btn" onclick="resetAccessCode()">合言葉を再発行する</button>
      <div class="code-box hidden" id="new-code-box">
        <div class="code-text" id="new-code-text"></div>
      </div>
      <button id="delete-data-btn" class="danger" style="margin-top:24px;" onclick="confirmDeleteAllData()">すべてのデータを削除する</button>
      <p class="msg hidden" id="action-msg"></p>
    </div>

    <div class="card hidden" id="error-card">
      <h1>⚠️ リンクが無効です</h1>
      <p class="subtitle">このリンクは無効か、発行から24時間が経過しています。お手数ですが、もう一度復旧リンクの送信をお試しください。</p>
    </div>
  </div>

  <script>
    const FUNCTION_URL = 'https://iyxjyobdpqsyrdbcckis.supabase.co/functions/v1/account-recovery';
    const ANON_KEY = 'sb_publishable_1eBf5hTxX141q9ExRFdImg_Zzuc1NI2';
    const token = new URLSearchParams(location.search).get('token') || '';

    async function callApi(action, payload) {
      const res = await fetch(FUNCTION_URL, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload }),
      });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, status: res.status, data };
    }

    async function requestRecovery() {
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('request-msg');
      const btn = document.getElementById('request-btn');
      if (!email) return;
      btn.disabled = true;
      btn.textContent = '送信中...';
      const { ok } = await callApi('request_recovery', { family_email: email });
      msg.textContent = ok
        ? 'ご入力いただいたメールアドレスが登録・確認済みのものであれば、復旧リンクを送信しました。メールをご確認ください。'
        : '通信エラーが発生しました。しばらく後でお試しください。';
      msg.classList.remove('hidden');
      msg.classList.add(ok ? 'success' : 'error');
      btn.disabled = false;
      btn.textContent = '復旧リンクを送信する';
    }

    async function resetAccessCode() {
      const btn = document.getElementById('reset-code-btn');
      const box = document.getElementById('new-code-box');
      const text = document.getElementById('new-code-text');
      btn.disabled = true;
      btn.textContent = '再発行中...';
      const { ok, data } = await callApi('reset_access_code', { token });
      if (ok && data.access_code) {
        text.textContent = data.access_code;
        box.classList.remove('hidden');
        btn.textContent = 'もう一度再発行する';
      } else {
        btn.textContent = '失敗しました。再度お試しください';
      }
      btn.disabled = false;
    }

    function confirmDeleteAllData() {
      if (!confirm('会話・日記・設定など、このアカウントのすべてのデータを完全に削除します。この操作は取り消せません。よろしいですか？')) return;
      deleteAllData();
    }

    async function deleteAllData() {
      const btn = document.getElementById('delete-data-btn');
      const msg = document.getElementById('action-msg');
      btn.disabled = true;
      btn.textContent = '削除中...';
      const { ok } = await callApi('delete_all_data', { token });
      msg.textContent = ok ? 'すべてのデータを削除しました。' : '削除に失敗しました。しばらく後でお試しください。';
      msg.classList.remove('hidden');
      msg.classList.add(ok ? 'success' : 'error');
      if (ok) {
        document.getElementById('reset-code-btn').disabled = true;
        btn.textContent = '削除済み';
      } else {
        btn.disabled = false;
        btn.textContent = 'すべてのデータを削除する';
      }
    }

    (async function init() {
      if (!token) return; // トークンなし＝申請フォームをそのまま表示
      document.getElementById('request-card').classList.add('hidden');
      const { ok, data } = await callApi('check_token', { token });
      if (ok) {
        document.getElementById('action-card').classList.remove('hidden');
        document.getElementById('welcome-text').textContent = `${data.user_name || 'ご本人'}さんのアカウントを復旧できます。`;
      } else {
        document.getElementById('error-card').classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
